name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Angular (production)
        run: npx ng build --configuration=production --base-href "/${{ github.event.repository.name }}/"

      - name: Add SPA fallback (404.html = index.html)
        run: cp dist/harikrishnan-portfolio/browser/index.html dist/harikrishnan-portfolio/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/harikrishnan-portfolio/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
