<section id="education" class="section education">
  <div class="container">

    <div class="education__head">
      <span class="section-eyebrow reveal" appReveal>// 05 — education</span>
      <h2 class="section-title reveal" appReveal style="--i: 1">
        Foundations &amp; <span class="gradient-text">credentials</span>.
      </h2>
      <p class="section-subtitle reveal" appReveal style="--i: 2">
        Where the formal learning happened — and where curiosity took over.
      </p>
    </div>

    <div class="education__grid">
      @for (e of education; track e.institution; let i = $index) {
        <article class="edu glass reveal reveal-scale" appReveal [style.--i]="i + 1">
          <div class="edu__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <div class="edu__body">
            <h3 class="edu__degree">{{ e.degree }}</h3>
            <div class="edu__inst gradient-text">{{ e.institution }}</div>
            <div class="edu__meta">
              <span class="mono">{{ e.period }}</span>
              <span class="edu__dot"></span>
              <span>{{ e.location }}</span>
            </div>
          </div>
        </article>
      }
    </div>

  </div>
</section>
